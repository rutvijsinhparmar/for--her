<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archive of Us</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Crimson+Text:ital,wght@0,400;1,600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="box-wrapper">
        <div id="mystery-box">
            <div class="box-lid"></div>
            <div class="box-body">
                <span class="seal">✉️</span>
            </div>
            <p class="instruction">Click to Unseal</p>
        </div>
    </div>

    <div id="gift-container" class="hidden">
        <div class="gift-card" id="gift1">
            <div class="ornament"></div>
            <img src="flowers.jpg" alt="Pink Roses and Lilies" class="gift-img">
            <h2>A Royal Garden</h2>
            <p>For the girl who blooms brighter than any flower <3 </p>
        </div>

        <div class="gift-card" id="gift2">
            <div class="ornament"></div>
            <img src="cat.jpg" alt="Sherlock Cat" class="gift-img">
            <h2>Daily dose of Serotonin</h2>
            <p>Billu is here to support you forever</p>
        </div>

        <div class="gift-card" id="gift3">
            <div class="ornament"></div>
            <div class="message-text">
                <h2>Always.</h2>
                <p>Saumya,you don't even realize it,but you carry a quiet kind of magic that keeps going.
                keep shining and inspiring forever :D </p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
